name: ci

on:
  push:
    branches:
      - hom
      - prod

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '14'

    - name: Install dependencies
      run: npm install

    - name: Build Docker image
      run: |
        if [ "${{ github.ref }}" == "refs/heads/hom" ]; then
          docker build -t meu-app-react --build-arg API_URL=http://homfmp.us-east-1.elasticbeanstalk.com .
        elif [ "${{ github.ref }}" == "refs/heads/prod" ]; then
          docker build -t meu-app-react --build-arg API_URL=http://prodfmp.us-east-1.elasticbeanstalk.com .
        fi

    #- name: Run Docker container
    #  run: docker-compose up -d
